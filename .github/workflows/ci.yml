name: CI

# Checagens em cada push/PR. A suíte visual completa permanece no release local,
# mas os testes de integridade leem os chunks versionados diretamente do disco e
# rodam no CI para impedir publicação de totais incoerentes ou cruzamentos quebrados.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checagens-estaticas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Dependências de validação de dados
        run: python -m pip install -r requirements.txt
      - name: Dependências Node
        run: npm ci
      - name: Sintaxe dos scripts e HTML (check-syntax)
        run: node scripts/check-syntax.mjs
      - name: Integridade de acentos/encoding (check-accents)
        run: node scripts/check-accents.mjs
      - name: Schemas dos dados publicados
        run: python painel-cidadao/validar_schemas_dados.py
      - name: Auditoria bloqueante das emendas
        run: python painel-cidadao/emendas/audit_emendas.py
      - name: Integridade dos cálculos e cruzamentos externos
        run: npx playwright test tests/calculos.spec.js tests/cruzamentos-externos.spec.js --workers=1
      - name: Resiliência dos coletores e explicabilidade dos cruzamentos
        run: npm run test:pipeline
